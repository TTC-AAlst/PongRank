services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ponguser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: PongRank
    volumes:
      - pongrank-db-data:/var/lib/postgresql/data
    healthcheck:
      # No healthcheck => Docker reports no State.Health => Coolify shows "unknown".
      test: ["CMD-SHELL", "pg_isready -U ponguser -d PongRank"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ml-webapi:
    build:
      context: ./
      dockerfile: ./src/PongRank.WebApi/Dockerfile
      args:
        - Nuget_CustomFeedUserName=${Nuget_CustomFeedUserName}
        - Nuget_CustomFeedPassword=${Nuget_CustomFeedPassword}
    restart: always
    expose:
      - "5000"
    environment:
      - ASPNETCORE_URLS=http://*:5000
      - DOTNET_ENVIRONMENT=Release
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - pongrank-ml-models:/ml-models
    depends_on:
      - db
    healthcheck:
      # Liveness (not /health/ready) — Coolify shows container health / restarts on fail.
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  pongrank-db-data:
  pongrank-ml-models:
